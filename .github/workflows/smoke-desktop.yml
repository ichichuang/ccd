name: Smoke Desktop

on:
  push:
    branches:
      - feat/tauri-integration
  pull_request:
    branches:
      - feat/tauri-integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: smoke-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
    env:
      SKIP_TAURI_ICON: ${{ matrix.os == 'windows-latest' && '1' || '' }}

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Smoke build desktop targets without bundling
        run: pnpm exec tauri build --no-bundle --target ${{ matrix.target }}
