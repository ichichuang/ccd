name: CI Guardian

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Core Quality
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Block WIP commits on main
        if: github.event_name == 'pull_request'
        run: |
          if git log --format='%s' origin/main..HEAD | grep -qiE '^wip(\(.*\))?:'; then
            echo "::error::❌ WIP commits detected! Please squash or reword before merging to main."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Deterministic Frozen Install
        run: bash scripts/exec.sh pnpm install --frozen-lockfile

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Authorize GitHub CLI
        run: echo "${{ github.token }}" | gh auth login --with-token

      - name: Core validation parity
        run: bash scripts/exec.sh pnpm build:ci

  e2e-qa:
    name: E2E QA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      PLAYWRIGHT_CHROMIUM_CHANNEL: chrome

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Deterministic Frozen Install
        run: bash scripts/exec.sh pnpm install --frozen-lockfile

      - name: Verify system Chrome for Playwright
        run: google-chrome --version

      - name: Install CJK fonts for visual snapshots
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f

      - name: Prepare internal workspace packages
        run: bash scripts/exec.sh pnpm ci:prepare-internal

      - name: Run Playwright QA suite
        run: bash scripts/exec.sh pnpm e2e:qa:prepared

      - name: Upload Playwright failure artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
