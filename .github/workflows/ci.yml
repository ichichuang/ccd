name: CI Guardian

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Core Quality
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Block WIP commits on main
        if: github.event_name == 'pull_request'
        run: |
          if git log --format='%s' origin/main..HEAD | grep -qiE '^wip(\(.*\))?:'; then
            echo "::error::❌ WIP commits detected! Please squash or reword before merging to main."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Deterministic Frozen Install
        run: pnpm install --frozen-lockfile

      - name: Authorize GitHub CLI
        run: echo "${{ github.token }}" | gh auth login --with-token

      # repair_list.txt is gitignored and created by ai:sync from the template; doctor requires it.
      - name: Sync AI adapters (materialize local runtime)
        run: pnpm ai:sync

      - name: Unified Governance Gate
        run: pnpm governance:gate

      - name: Verify Generated AI Artifacts Are Synced
        run: |
          pnpm ai:sync
          pnpm ai:sync:codex
          if ! git diff --quiet -- AGENTS.md CLAUDE.md .ai/manifests/skills-lock.json; then
            echo "::error::Generated AI artifacts are stale. Run pnpm ai:sync && pnpm ai:sync:codex and commit the results."
            git diff -- AGENTS.md CLAUDE.md .ai/manifests/skills-lock.json
            exit 1
          fi

      - name: Strict Type Check
        run: pnpm type-check

      - name: Unit Tests
        run: pnpm test:run

      - name: Strict Lint Check
        run: pnpm lint:check

      - name: Production Build Test
        run: pnpm exec turbo run build

      - name: Desktop Bundle Guard
        run: |
          pnpm build:desktop
          pnpm budget:desktop

  e2e:
    name: E2E QA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      TZ: Asia/Shanghai
      VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium

      - name: QA Regression E2E
        run: pnpm e2e:qa

      - name: Ensure snapshots were not updated in CI
        if: always()
        run: |
          SNAPSHOT_CHANGES="$(git status --porcelain -- e2e/__snapshots__)"
          if [ -n "$SNAPSHOT_CHANGES" ]; then
            echo "::error::Playwright snapshots changed during CI. Generate baselines locally with pnpm e2e:update and commit them separately."
            echo "$SNAPSHOT_CHANGES"
            git diff -- e2e/__snapshots__
            exit 1
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
