name: CI Guardian

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Block WIP commits on main
        if: github.event_name == 'pull_request'
        run: |
          if git log --format='%s' origin/main..HEAD | grep -qiE '^wip(\(.*\))?:'; then
            echo "::error::❌ WIP commits detected! Please squash or reword before merging to main."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # repair_list.txt is gitignored and created by ai:sync from the template; doctor requires it.
      - name: Sync AI adapters (materialize local runtime)
        run: pnpm ai:sync

      - name: Run Architecture Doctor
        run: pnpm ai:doctor

      - name: Drift Check
        run: pnpm drift-check

      - name: Verify Generated AI Artifacts Are Synced
        run: |
          pnpm ai:sync
          pnpm ai:sync:codex
          if ! git diff --quiet -- AGENTS.md .cursor .ai/manifests/skills-lock.json; then
            echo "::error::Generated AI artifacts are stale. Run pnpm ai:sync && pnpm ai:sync:codex and commit the results."
            git diff -- AGENTS.md .cursor .ai/manifests/skills-lock.json
            exit 1
          fi

      - name: Strict Type Check
        run: pnpm type-check

      - name: Unit Tests
        run: pnpm test:run

      - name: Strict Lint Check
        run: pnpm lint:check

      - name: Production Build Test
        run: pnpm build:ci
