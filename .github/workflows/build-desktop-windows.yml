name: Build Desktop (Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - feat/tauri-integration

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Windows CI 不运行 sips 图像预处理，跳过 tauri icon 防止非正方源图导致失败
      SKIP_TAURI_ICON: '1'
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync brand metadata
        run: pnpm sync:brand

      - name: Build Tauri app for Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-bundles
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
          if-no-files-found: error
