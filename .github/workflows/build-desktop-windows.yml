name: Build Desktop (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Windows CI 不运行 sips 图像预处理，跳过 tauri icon 防止非正方源图导致失败
      SKIP_TAURI_ICON: '1'
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync desktop metadata
        run: pnpm sync:brand && pnpm sync:version && pnpm sync:desktop-config

      - name: Build Tauri app for Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CCD Desktop App ${{ github.ref_name }}
          releaseBody: "🚀 CCD 桌面端应用程序正式发布！\n\n请在下方下载适用于您操作系统的安装包。"
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
