name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署运行，避免竞态
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 构建
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: pnpm build:ci
        env:
          # 注入 base 路径：仓库名为 ccd，GitHub Pages URL 为
          # https://ichichuang.github.io/ccd/
          # vite.config.ts 第 78 行 base: VITE_PUBLIC_PATH 会读取此变量
          VITE_PUBLIC_PATH: /ccd/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ──────────────────────────────────────────────
  # Job 2: 部署到 GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
