name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署运行，避免竞态
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 构建
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # repair_list.txt is gitignored and created by ai:sync from the template; doctor requires it.
      - name: Sync AI adapters (materialize local runtime)
        run: pnpm ai:sync

      - name: Run Architecture Doctor
        run: pnpm ai:doctor

      - name: Drift Check
        run: pnpm drift-check

      - name: Strict Type Check
        run: pnpm type-check

      - name: Unit Tests
        run: pnpm test:run

      - name: Strict Lint Check
        run: pnpm lint:check

      - name: Build for GitHub Pages
        run: pnpm build:ci
        env:
          # 注入 base 路径：仓库名为 ccd，GitHub Pages URL 为
          # https://ichichuang.github.io/ccd/
          # vite.config.ts 第 78 行 base: VITE_PUBLIC_PATH 会读取此变量
          VITE_PUBLIC_PATH: /ccd/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  # ──────────────────────────────────────────────
  # Job 2: 部署到 GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        env:
          NODE_NO_WARNINGS: '1'
