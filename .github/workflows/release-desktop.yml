name: Release Desktop

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SKIP_TAURI_ICON: ${{ matrix.os == 'windows-latest' && '1' || '' }}

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: '1'
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        env:
          NODE_NO_WARNINGS: '1'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate desktop build without bundling
        run: pnpm exec tauri build --no-bundle --target ${{ matrix.target }}

      - name: Export updater signing key when configured
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_SECRET" ]; then
            echo "Tauri updater signing key not configured; release artifacts will be published without updater metadata."
            exit 0
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY_SECRET"
            echo "EOF"
          } >> "$GITHUB_ENV"

          if [ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Export Apple signing secrets when configured
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_SECRET" ]; then
            echo "Apple signing secrets not configured; publishing unsigned macOS bundles."
            exit 0
          fi

          {
            echo "APPLE_CERTIFICATE<<EOF"
            printf '%s\n' "$APPLE_CERTIFICATE_SECRET"
            echo "EOF"
          } >> "$GITHUB_ENV"

          if [ -n "$APPLE_CERTIFICATE_PASSWORD_SECRET" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_SIGNING_IDENTITY_SECRET" ]; then
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_ID_SECRET" ]; then
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_PASSWORD_SECRET" ]; then
            echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub release and upload bundles
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CCD Desktop ${{ github.ref_name }}
          releaseBody: |
            Automated desktop release for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
