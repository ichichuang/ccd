<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="CCD Desktop"
    />
    <title>CCD Desktop</title>

    <script>
      ;(function () {
        try {
          var html = document.documentElement
          var mode = localStorage.getItem('ccd:desktop:theme-mode') || 'auto'
          var isDark =
            mode === 'dark' ||
            (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)

          html.dataset.appReady = 'false'
          html.dataset.preloaderState = 'visible'
          html.dataset.runtimeLoading = 'true'

          if (isDark) {
            html.classList.add('dark')
          } else {
            html.classList.remove('dark')
          }
        } catch (error) {}
      })()
    </script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: rgb(var(--background, 248 240 240));
        color: rgb(var(--foreground, 51 51 51));
      }

      #preloader-bg {
        position: fixed;
        inset: 0;
        z-index: 9999999;
        display: grid;
        width: 100%;
        min-width: 100vw;
        height: 100vh;
        min-height: 100dvh;
        place-items: center;
        background-color: rgb(var(--background, 248 240 240));
        transition:
          opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
          visibility 0.4s ease;
      }

      #preloader-bg.preloader-fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .pure-css-loader {
        position: relative;
        width: 48px;
        height: 48px;
        border-radius: 50%;
      }

      .pure-css-loader::before,
      .pure-css-loader::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        box-sizing: border-box;
      }

      .pure-css-loader::before {
        border: 4px solid rgb(var(--primary, 106 90 205) / 0.2);
        border-top-color: rgb(var(--primary, 106 90 205));
        animation: pure-spin 0.9s linear infinite;
      }

      .pure-css-loader::after {
        border: 4px solid transparent;
        border-right-color: rgb(var(--primary, 106 90 205) / 0.65);
        transform: scale(0.72);
        animation: pure-spin-reverse 1.2s linear infinite;
        opacity: 0.9;
      }

      @keyframes pure-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pure-spin-reverse {
        to {
          transform: scale(0.72) rotate(-360deg);
        }
      }
    </style>
  </head>

  <body>
    <div
      id="preloader-bg"
      data-testid="native-preloader"
    >
      <div
        class="pure-css-loader"
        role="status"
        aria-label="Loading"
      ></div>
    </div>

    <div id="app"></div>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
